name: Usar dashboard real

on:
  push:
    paths:
      - '.github/workflows/use-live-dashboard.yml'

permissions:
  contents: write

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Reemplazar vista ficticia por dashboard real
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          live_url = "https://script.google.com/macros/s/AKfycbzE26z7tcEbnwLPKSLLW8H_rK7UqwKV17rV8YBJVT4lB4slY0qorsf8cL4cnsys5ShGhw/exec"
          index = Path("index.html")
          html = index.read_text(encoding="utf-8")
          fake_preview = '<div class="project-card__preview has-image"><img alt="Vista del dashboard Mundial 2026 con análisis histórico, predicción inicial y predicción viva" class="project-preview-image" loading="lazy" src="assets/mundial-dashboard-preview.svg"/></div>'
          real_preview = f'''<a aria-label="Abrir el dashboard interactivo Mundial 2026" class="project-card__preview dashboard-live-preview" href="{live_url}" rel="noopener noreferrer" target="_blank"><div class="preview-placeholder dashboard-live-preview__content"><svg aria-hidden="true" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 96 96"><rect height="58" rx="7" width="76" x="10" y="14"></rect><path d="M32 82h32M48 72v10M24 55l13-13 10 9 20-22"></path></svg><strong>Dashboard Mundial 2026</strong><span>Abrir experiencia interactiva</span></div></a>'''
          if fake_preview not in html:
              raise SystemExit("No se encontró la vista ficticia del Mundial")
          html = html.replace(fake_preview, real_preview, 1)
          old_actions = '<button class="text-link project-detail-trigger" data-project="mundial" type="button">Ver detalle</button><a class="text-link text-link--muted" href="https://github.com/Jchernand3z19/Portafolio"'
          new_actions = f'<button class="text-link project-detail-trigger" data-project="mundial" type="button">Ver detalle</button><a class="text-link dashboard-direct-link" href="{live_url}" rel="noopener noreferrer" target="_blank">Abrir dashboard</a><a class="text-link text-link--muted" href="https://github.com/Jchernand3z19/Portafolio"'
          if old_actions not in html:
              raise SystemExit("No se encontraron las acciones del proyecto Mundial")
          html = html.replace(old_actions, new_actions, 1)
          detail_close = '</div></div><section class="detail-section"><h2>Proceso de desarrollo</h2>'
          detail_link = f'</div></div><div class="detail-live-actions"><a class="button detail-live-link" hidden="" id="detail-live-link" href="{live_url}" rel="noopener noreferrer" target="_blank">Abrir dashboard interactivo</a></div><section class="detail-section"><h2>Proceso de desarrollo</h2>'
          if detail_close not in html:
              raise SystemExit("No se encontró dónde agregar el enlace del dashboard")
          html = html.replace(detail_close, detail_link, 1)
          index.write_text(html, encoding="utf-8")
          script = Path("script.js")
          js = script.read_text(encoding="utf-8")
          js = js.replace('previewLabel: "Dashboard histórico y predictivo",\n        image: "assets/mundial-dashboard-preview.svg",\n        imageAlt: "Dashboard Mundial 2026 con histórico, predicción inicial y predicción viva",', f'previewLabel: "Dashboard Mundial 2026 disponible en Google Apps Script",\n        liveUrl: "{live_url}",')
          marker = 'document.getElementById("detail-preview-label").textContent = project.previewLabel;\n\n'
          addition = 'document.getElementById("detail-preview-label").textContent = project.previewLabel;\n      const detailLiveLink = document.getElementById("detail-live-link");\n      if (project.liveUrl) {\n        detailLiveLink.href = project.liveUrl;\n        detailLiveLink.hidden = false;\n      } else {\n        detailLiveLink.removeAttribute("href");\n        detailLiveLink.hidden = true;\n      }\n\n'
          if marker not in js:
              raise SystemExit("No se encontró el punto de actualización del detalle")
          js = js.replace(marker, addition, 1)
          script.write_text(js, encoding="utf-8")
          css = Path("css/projects.css")
          styles = css.read_text(encoding="utf-8")
          styles += '''\n\n.dashboard-live-preview { text-decoration:none; background:radial-gradient(circle at 30% 20%,rgba(59,130,246,.18),transparent 42%),linear-gradient(135deg,#0d1220,#111a2d); border-bottom:1px solid var(--border); transition:background .25s ease,box-shadow .25s ease; }\n.dashboard-live-preview::after { background:linear-gradient(135deg,rgba(59,130,246,.04),rgba(10,14,26,.18)); }\n.dashboard-live-preview:hover { background:radial-gradient(circle at 30% 20%,rgba(59,130,246,.28),transparent 45%),linear-gradient(135deg,#0d1220,#14213a); box-shadow:inset 0 0 0 1px rgba(59,130,246,.45); }\n.dashboard-live-preview__content strong { color:var(--text-main); font-size:18px; }\n.dashboard-live-preview__content span { color:var(--accent); font-weight:500; }\n.dashboard-direct-link { color:var(--accent); }\n.detail-live-actions { display:flex; justify-content:center; margin-top:-28px; margin-bottom:52px; }\n.detail-live-link { min-width:260px; }\n'''
          css.write_text(styles, encoding="utf-8")
          PY
      - name: Guardar corrección
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html script.js css/projects.css
          git commit -m "Usa el dashboard real del Mundial 2026"
          git push
