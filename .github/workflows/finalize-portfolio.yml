name: Finalizar portafolio completo

on:
  push:
    paths:
      - '.github/workflows/finalize-portfolio.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Restaurar index y vista del dashboard
        shell: bash
        run: |
          cat > /tmp/index.b64 <<'INDEX_PAYLOAD'
          
          INDEX_PAYLOAD
          sed -i 's/^[[:space:]]*//' /tmp/index.b64
          base64 -d /tmp/index.b64 | gzip -d > index.html

          mkdir -p assets
          cat > /tmp/svg.b64 <<'SVG_PAYLOAD'
          
          SVG_PAYLOAD
          sed -i 's/^[[:space:]]*//' /tmp/svg.b64
          base64 -d /tmp/svg.b64 | gzip -d > assets/mundial-dashboard-preview.svg

          rm -f .github/workflows/finalize-portfolio.yml

      - name: Validar archivos
        shell: bash
        run: |
          test -s index.html
          test -s assets/mundial-dashboard-preview.svg
          grep -q 'jchernand3z@gmail.com' index.html
          grep -q 'juan-carlos-hernandez-ramos' index.html
          grep -q 'assets/mundial-dashboard-preview.svg' index.html
          grep -q '</html>' index.html

      - name: Guardar versión final
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/mundial-dashboard-preview.svg .github/workflows/finalize-portfolio.yml
          git commit -m 'Publica portafolio completo y final'
          git push
