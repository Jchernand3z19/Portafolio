name: Materialize Apps Script code

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix-code-viewer-empty-files-20260722'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix-code-viewer-empty-files-20260722
          fetch-depth: 0

      - name: Decode public source files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip

          root = Path('assets/code/apps-script')
          output = root / 'plain'
          output.mkdir(parents=True, exist_ok=True)

          def decode(paths, target):
              encoded = ''.join(
                  ''.join(path.read_text(encoding='utf-8').split())
                  for path in paths
              )
              decoded = gzip.decompress(base64.b64decode(encoded)).decode('utf-8')
              if not decoded.strip():
                  raise RuntimeError(f'{target} quedó vacío')
              (output / target).write_text(decoded, encoding='utf-8')

          decode([root / 'Code.gs.txt.gz.b64'], 'Code.gs.txt')
          decode([root / 'index.html.txt.gz.b64'], 'index.html.txt')
          decode(sorted(root.glob('style.html.txt.gz.b64.part*')), 'style.html.txt')
          decode(sorted(root.glob('script.html.txt.gz.b64.part*')), 'script.html.txt')

          code_path = output / 'Code.gs.txt'
          code = code_path.read_text(encoding='utf-8')
          replacements = {
              '1SYnQxZ3c8I_FQbzfo_3WRD53ZxTLqmbr': 'YOUR_TROPHY_IMAGE_FILE_ID',
              '1tP_O0pdd2d3aG9BbuMQeTQc4-cQb2CZgRQmV2z3jEUI': 'YOUR_PREDICTION_SPREADSHEET_ID',
              '1r0kR6EF1Pbw2kWYVWgNit0o-44PTRek-hIr2qukDbow': 'YOUR_TEAMS_SPREADSHEET_ID',
              '1EiVauyu_2tTnhPmqyWDL-OGg6xz4omRYczYaux8LGng': 'YOUR_MATCHES_SPREADSHEET_ID',
              '10GLz1zXG50XV-vJrcvCAxcTF0tXN8YAXyVQ3BYv8IL0': 'YOUR_PLAYERS_SPREADSHEET_ID',
              '1RYtp89i8J1tPdpfaL8FujSvkng9kuFAWxIjCBxOkLVI': 'YOUR_EVENTS_SPREADSHEET_ID',
          }
          for source, replacement in replacements.items():
              code = code.replace(source, replacement)

          header = '// Versión pública completa: los identificadores privados fueron sustituidos por marcadores.\n'
          if not code.startswith(header):
              code = header + code
          code_path.write_text(code, encoding='utf-8')

          for path in sorted(output.glob('*.txt')):
              if path.stat().st_size == 0:
                  raise RuntimeError(f'{path} quedó vacío')
              print(f'{path}: {path.stat().st_size} bytes')
          PY

      - name: Commit decoded files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/code/apps-script/plain
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Materializa código completo para el visor'
          git push origin HEAD:fix-code-viewer-empty-files-20260722
