name: Prediccion diaria Mundial 2026

on:
  workflow_dispatch:

  schedule:
    # Honduras usa UTC-6.
    # 11:17 UTC = 5:17 AM Honduras.
    - cron: "17 11 * * *"

permissions:
  contents: read

jobs:
  ejecutar-prediccion:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mundial-2026-predicciones

    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      MODEL_VERSION: v1.1
      ENVIRONMENT: production

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar prediccion dinamica
        run: python scripts/01_prediccion_dinamica_2026.py
