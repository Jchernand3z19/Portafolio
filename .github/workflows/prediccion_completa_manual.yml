name: Prediccion completa base Mundial 2026

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ejecutar-prediccion-completa:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mundial-2026-predicciones

    env:
      PYTHONPATH: ${{ github.workspace }}/mundial-2026-predicciones
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      MODEL_VERSION: v1.1
      ENVIRONMENT: production

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar prediccion completa base
        run: python scripts/03_prediccion_completa_2026.py
