name: Prediccion Viva Mundial 2026

on:
  workflow_dispatch:

  schedule:
    # Corre todos los dias a las 6:30 AM hora Honduras
    # Honduras UTC-6 -> 12:30 UTC
    - cron: "30 12 * * *"

permissions:
  contents: read

jobs:
  actualizar-prediccion-viva:
    name: Actualizar Prediccion Viva 2026
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mundial-2026-predicciones

    env:
      PYTHONPATH: ${{ github.workspace }}/mundial-2026-predicciones
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      GOOGLE_APPLICATION_CREDENTIALS: service_account.json
      MODEL_VERSION: v1.1
      ENVIRONMENT: production

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear archivo service_account.json
        run: |
          python - <<'PY'
          import json
          import os

          client_email = os.getenv("GOOGLE_CLIENT_EMAIL")
          private_key = os.getenv("GOOGLE_PRIVATE_KEY")

          if not client_email:
              raise ValueError("Falta el secret GOOGLE_CLIENT_EMAIL")

          if not private_key:
              raise ValueError("Falta el secret GOOGLE_PRIVATE_KEY")

          private_key = private_key.replace("\\n", "\n")

          service_account_info = {
              "type": "service_account",
              "client_email": client_email,
              "private_key": private_key,
              "token_uri": "https://oauth2.googleapis.com/token"
          }

          with open("service_account.json", "w", encoding="utf-8") as f:
              json.dump(service_account_info, f)

          print("service_account.json creado correctamente")
          print("Client email:", client_email)
          PY

      - name: Validar archivos requeridos
        run: |
          echo "Validando archivos requeridos..."

          if [ ! -f "scripts/04_crear_fact_partidos_prediccion_2026.py" ]; then
            echo "ERROR: No existe scripts/04_crear_fact_partidos_prediccion_2026.py"
            exit 1
          fi

          if [ ! -f "requirements.txt" ]; then
            echo "ERROR: No existe requirements.txt"
            exit 1
          fi

          if [ ! -f "service_account.json" ]; then
            echo "ERROR: No se pudo crear service_account.json"
            exit 1
          fi

          echo "Archivos requeridos encontrados."

      - name: Ejecutar tabla maestra fact_partidos_prediccion_2026
        run: |
          echo "Ejecutando tabla maestra fact_partidos_prediccion_2026..."
          python scripts/04_crear_fact_partidos_prediccion_2026.py

      - name: Ejecutar tabla final fact_prediccion_viva_2026 si existe
        run: |
          if [ -f "scripts/05_crear_fact_prediccion_viva_2026.py" ]; then
            echo "Ejecutando tabla final fact_prediccion_viva_2026..."
            python scripts/05_crear_fact_prediccion_viva_2026.py
          else
            echo "scripts/05_crear_fact_prediccion_viva_2026.py todavia no existe. Se omite este paso."
          fi

      - name: Finalizar
        run: |
          echo "Prediccion Viva Mundial 2026 actualizada correctamente."
